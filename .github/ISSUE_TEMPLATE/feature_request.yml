name: Feature request
description: Propose a focused addition or API improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem and use case
      description: Explain the problem before describing a preferred implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the public behavior, inputs, outputs, and expected evidence level.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note workarounds or smaller changes that could address the use case.
  - type: dropdown
    id: compatibility
    attributes:
      label: Compatibility impact
      options:
        - No public API or format change
        - Additive public API change
        - Breaking API change
        - Atlas schema change
        - Unsure
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: I reviewed the roadmap and current release scope.
          required: true
        - label: I identified any change to certification or safety semantics above.
          required: true
