name: Bug report
description: Report a reproducible defect in RBF-Safe.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve RBF-Safe. For security vulnerabilities or cases where a certified region may contain a collision, use private vulnerability reporting instead of this form.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Provide a release version or full commit hash.
      placeholder: v0.5.0 or 0123456789abcdef...
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform and toolchain
      placeholder: Ubuntu 24.04, GCC 13, CMake 3.28, Python 3.12
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe what happened and what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include the smallest input and commands that reproduce the problem. Remove confidential data.
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste diagnostics, stack traces, or manifest metadata. Do not include secrets.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I did not include credentials, private datasets, or other sensitive information.
          required: true
        - label: This report does not disclose a potentially unsafe certificate; if it does, I will report it privately.
          required: true
